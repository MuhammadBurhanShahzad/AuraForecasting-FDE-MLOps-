apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aura-ingress
  namespace: aura-forecasting
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: aura.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aura-service
            port:
              number: 80
