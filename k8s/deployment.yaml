
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aura-app
  namespace: aura-forecasting
  labels:
    app: aura
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aura
  template:
    metadata:
      labels:
        app: aura
        version: v1
    spec:
      containers:
      - name: aura-monolith
        image: burhan107/aura-pro:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: aura-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        startupProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
