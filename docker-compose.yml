version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: aura-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fde
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aura-network

  ml-service:
    build:
      context: ./ml-service
    container_name: aura-ml
    expose:
      - "5001"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - aura-network

  backend:
    build:
      context: ./backend
    container_name: aura-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/fde
      - ML_SERVICE_URL=http://ml-service:5001
    depends_on:
      - db
      - ml-service
    networks:
      - aura-network

  frontend:
    build:
      context: ./frontend
    container_name: aura-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aura-network

networks:
  aura-network:
    driver: bridge

volumes:
  postgres_data:
